<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Whitelist</title>
  <link rel="stylesheet" href="../../static/css/sdpi.css">
</head>

<body>
  <div class="sdpi-wrapper" style="display: none">
    <h3>Knob Configuration</h3>
    <div class="sdpi-item" id="controlling-app-container">
      <div class="sdpi-item-label">Controlling App</div>
      <select class="sdpi-item-value select" id="knob-mode">
      </select>
    </div>

    <div type="radio" class="sdpi-item" id="click-mode">
      <div class="sdpi-item-label">App Pool</div>
      <div class="sdpi-item-value">
        <div class="sdpi-item-child">
          <input id="click-whitelist" type="radio" name="clickMode" value="whitelist" checked>
          <label for="click-whitelist" class="sdpi-item-label"><span></span>Whitelist Only</label>
        </div>
        <div class="sdpi-item-child">
          <input id="click-all" type="radio" name="clickMode" value="all">
          <label for="click-all" class="sdpi-item-label"><span></span>All Apps</label>
        </div>
      </div>
    </div>

    <div type="radio" class="sdpi-item" id="knob-action">
      <div class="sdpi-item-label">Knob Action</div>
      <div class="sdpi-item-value">
        <div class="sdpi-item-child">
          <input id="knob-cycle" type="radio" name="knobAction" value="cycle" checked>
          <label for="knob-cycle" class="sdpi-item-label"><span></span>Cycle Apps</label>
        </div>
        <div class="sdpi-item-child">
          <input id="knob-mute" type="radio" name="knobAction" value="mute">
          <label for="knob-mute" class="sdpi-item-label"><span></span>Mute App</label>
        </div>
      </div>
    </div>

    <div type="radio" class="sdpi-item" id="screen-action">
      <div class="sdpi-item-label">Screen Action</div>
      <div class="sdpi-item-value">
        <div class="sdpi-item-child">
          <input id="screen-cycle" type="radio" name="screenAction" value="cycle" checked>
          <label for="screen-cycle" class="sdpi-item-label"><span></span>Cycle Apps</label>
        </div>
        <div class="sdpi-item-child">
          <input id="screen-mute" type="radio" name="screenAction" value="mute">
          <label for="screen-mute" class="sdpi-item-label"><span></span>Mute App</label>
        </div>
      </div>
    </div>

    <div class="sdpi-item">
      <div class="sdpi-item-label">Volume Step</div>
      <input type="number" class="sdpi-item-value" id="volume-step" value="5" min="1" max="100" />
    </div>

    <div class="sdpi-item">
      <div class="sdpi-item-label">Mute Icon Overlay</div>
      <button class="sdpi-item-value" id="set-mute-icon" style="flex: 1; cursor: pointer;">Choose Custom Icon</button>
      <button id="clear-mute-icon" style="cursor: pointer; color: red; font-size: 16px; background: none; border: none; margin-left: 5px;">✖️</button>
      <input type="file" id="mute-icon-input" accept=".png,.jpg,.jpeg,.bmp,.gif" style="display: none" />
    </div>
    
    <h3>Software Whitelist</h3>
    <div id="whitelist-container"></div>
    <input type="file" id="app-input-file" accept=".exe" style="display: none" />
    <button id="add-app">Add Manually (.exe)</button>

    <h3>Detected audio processes</h3>
    <button id="refresh-audio">Refresh processes</button>
    <div id="audio-process-list"></div>
  </div>

  <script src="../../static/utils/common.js"></script>
  <script src="../../static/action.js"></script>
  <script src="index.js"></script>
</body>
<style>
    #initiateBox,
    #initiateBoxx {
        justify-content: center;
        font-weight: bold;
    }
    #audio-process-list {
      margin-top: 10px;
    }
    #audio-process-list .sdpi-item {
      margin-bottom: 6px;
    }
    .sdpi-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sdpi-item button {
      background: none;
      border: none;
      font-size: 16px;
      color: red;
      cursor: pointer;
    }
    #audio-process-list .sdpi-item button {
      background: none;
      border: none;
      font-size: 16px;
      color: green;
      cursor: pointer;
    }
</style>
</html>
